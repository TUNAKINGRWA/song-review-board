<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松松复盘日记 · 归档看板</title>
<style>
  :root{
    --bg:#faf6ef; --bg2:#fffdf9; --card:#ffffff; --card2:#f5efe4;
    --line:#ece4d6; --line2:#ddd2bf;
    --orange:#e8631a; --orange-l:#f5862f; --gold:#caa24a; --cream:#7a5424;
    --up:#dc3a3a; --down:#159b57; --t1:#2c2620; --t2:#6f6354; --t3:#9f9482;
    --sh:0 2px 14px rgba(120,90,40,.07); --sh2:0 6px 22px rgba(120,90,40,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,sans-serif;
    background:radial-gradient(1100px 640px at 82% -8%,rgba(232,99,26,.10),transparent 60%),
               radial-gradient(820px 560px at -5% 102%,rgba(202,162,74,.12),transparent 55%),var(--bg);
    color:var(--t1);line-height:1.6;min-height:100vh;padding-bottom:60px}
  .wrap{max-width:1100px;margin:0 auto;padding:0 22px}
  .up{color:var(--up)}.down{color:var(--down)}.org{color:var(--orange)}
  .mono{font-variant-numeric:tabular-nums}

  .top{position:sticky;top:0;z-index:50;background:rgba(255,253,249,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .top .wrap{padding-top:12px;padding-bottom:11px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;margin-bottom:10px;flex-wrap:wrap}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--orange)}
  .brand .sub{font-size:11px;color:var(--t3);font-weight:500}
  /* 搜索 */
  .searchbox{margin-left:auto;position:relative}
  .searchbox input{width:230px;padding:7px 12px 7px 30px;border:1px solid var(--line2);border-radius:999px;
    background:var(--card);font-size:12.5px;color:var(--t1);outline:none;transition:.2s}
  .searchbox input:focus{border-color:var(--orange);width:280px}
  .searchbox::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.5}
  .sres{position:absolute;right:0;top:38px;width:340px;max-height:380px;overflow-y:auto;background:var(--card);
    border:1px solid var(--line2);border-radius:13px;box-shadow:var(--sh2);display:none;z-index:60}
  .sres.show{display:block}
  .sres .it{padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
  .sres .it:hover{background:var(--card2)}
  .sres .it .dd{font-size:12px;font-weight:800;color:var(--orange)}
  .sres .it .tx{font-size:12px;color:var(--t2);margin-top:2px}
  .sres .it .tx mark{background:rgba(232,99,26,.18);color:var(--cream);border-radius:3px;padding:0 2px}
  .sres .none{padding:14px;font-size:12.5px;color:var(--t3);text-align:center}

  .ticker{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:11px}
  .ticker .lq{display:flex;align-items:baseline;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:6px 12px;box-shadow:var(--sh)}
  .ticker .lq .nm{font-size:11.5px;color:var(--t2)}
  .ticker .lq .px{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
  .ticker .lq .pc{font-size:12px;font-weight:700}
  .ticker .meta{margin-left:auto;font-size:11px;color:var(--t3);display:flex;align-items:center;gap:9px}
  .ticker .live{display:inline-flex;align-items:center;gap:5px;color:var(--down);font-weight:600}
  .ticker .live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--down);animation:livep 1.6s infinite}
  @keyframes livep{0%,100%{opacity:1}50%{opacity:.25}}
  .ticker .rf{cursor:pointer;border:1px solid var(--line2);background:var(--card2);border-radius:7px;padding:3px 9px;font-size:11px;color:var(--t2)}
  .ticker .rf:hover{color:var(--orange);border-color:rgba(232,99,26,.4)}
  .timeline{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px}
  .tl{flex:1;min-width:165px;text-align:left;background:var(--card);border:1px solid var(--line);
    border-radius:13px;padding:10px 13px;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
  .tl:hover{transform:translateY(-2px)}
  .tl.active{border-color:var(--orange);box-shadow:0 4px 16px rgba(232,99,26,.18)}
  .tl .d{font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:7px}
  .tl .d .wd{font-size:10.5px;color:var(--t3);font-weight:500}
  .tl .q{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.4}
  .tl.active .d{color:var(--orange)}
  .tl.flow{min-width:96px;flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
  .tl.flow .ic{font-size:17px}
  .tl.flow .lb{font-size:11.5px;font-weight:700;margin-top:2px}

  #view{padding-top:22px}
  .hero{display:grid;grid-template-columns:1.6fr 1fr;gap:24px;align-items:center}
  .hero .eye{font-size:12px;letter-spacing:2px;color:var(--orange);font-weight:700}
  .hero h1{font-size:29px;font-weight:800;line-height:1.2;margin:8px 0 0}
  .hero .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  .pill{font-size:12px;padding:4px 11px;border-radius:999px;border:1px solid var(--line2);background:var(--card);color:var(--t2);box-shadow:var(--sh)}
  .pill.warn{color:var(--up);border-color:rgba(220,58,58,.3);background:rgba(220,58,58,.06)}
  .gauge{position:relative;width:150px;height:150px;margin:0 auto}
  .gauge .lab{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .n{font-size:40px;font-weight:800;color:var(--orange);line-height:1}
  .gauge .c{font-size:11px;color:var(--t2);margin-top:4px;text-align:center;padding:0 12px}

  /* 小节导航 */
  .secnav{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px;padding-top:14px;border-top:1px dashed var(--line2)}
  .secnav a{font-size:11.5px;padding:4px 11px;border-radius:999px;background:var(--card2);border:1px solid var(--line);color:var(--t2);text-decoration:none;transition:.15s}
  .secnav a:hover{color:var(--orange);border-color:rgba(232,99,26,.35)}

  section{padding:20px 0;border-top:1px solid var(--line);margin-top:6px;scroll-margin-top:150px}
  .sh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sh .bar{width:5px;height:19px;border-radius:3px;background:var(--orange)}
  .sh h2{font-size:17px;font-weight:800}
  .sh .en{font-size:11px;color:var(--t3);letter-spacing:1px}
  .grid{display:grid;gap:13px}
  .c3{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:1fr 1fr}.c4{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--sh)}
  .idx .nm{font-size:13px;color:var(--t2);display:flex;justify-content:space-between}
  .idx .tag{font-size:10.5px;padding:1px 6px;border-radius:5px;background:rgba(220,58,58,.1);color:var(--up)}
  .idx .tag.u{background:rgba(21,155,87,.1);color:var(--down)}
  .idx .cl{font-size:25px;font-weight:800;margin:5px 0 1px}
  .idx .cg{font-size:14px;font-weight:700}
  .idx .ex{font-size:11.5px;color:var(--t3);margin-top:7px;display:grid;gap:2px}
  .idx .ex .r{display:flex;justify-content:space-between}
  .stat .k{font-size:11.5px;color:var(--t3)}
  .stat .v{font-size:20px;font-weight:800;margin:3px 0 1px}
  .stat .d{font-size:11px;color:var(--t2)}
  .vs{display:flex;height:36px;border-radius:9px;overflow:hidden;margin:4px 0}
  .vs .l{background:var(--up);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .vs .r{background:var(--down);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .ladder{display:grid;gap:7px;margin-top:6px}
  .step{display:flex;align-items:center;gap:10px}
  .step .lv{font-size:11px;color:var(--t3);width:30px}
  .step .bw{flex:1;height:25px;background:var(--card2);border:1px solid var(--line);border-radius:6px;overflow:hidden;position:relative}
  .step .fl{height:100%;display:flex;align-items:center;padding:0 11px;font-size:11.5px;font-weight:600;color:#fff;white-space:nowrap}
  .step.brk .bw{border:1px dashed rgba(220,58,58,.5);background:rgba(220,58,58,.04)}
  .step.brk .em{position:absolute;inset:0;display:flex;align-items:center;padding-left:11px;color:var(--up);font-size:11.5px;font-weight:600}
  .chip{display:inline-block;font-size:11.5px;padding:4px 10px;border-radius:7px;background:var(--card2);border:1px solid var(--line);color:var(--t2);margin:4px 5px 0 0}
  .chip.hot{color:var(--orange);border-color:rgba(232,99,26,.3)}
  .fl{display:grid;gap:8px}
  .fl .r{display:grid;grid-template-columns:104px 1fr 60px;align-items:center;gap:9px;font-size:12.5px}
  .fl .nm{color:var(--t2);text-align:right}
  .fl .tk{height:20px;background:var(--card2);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .fl .f{height:100%;border-radius:5px}
  .fl .v{font-weight:700;font-size:12px}
  .stk{display:grid;grid-template-columns:78px 1fr 78px;align-items:center;gap:8px;margin-bottom:6px;font-size:12.5px}
  .stk .tk{height:15px;background:var(--card2);border-radius:4px;overflow:hidden}
  .stk .f{height:100%}
  .stk .pt{text-align:right;font-weight:700;font-size:11.5px}
  .stk .pt small{color:var(--t3);font-weight:500}

  .banner{background:linear-gradient(135deg,#e8631a,#c84e0f);color:#fff;border-radius:12px;padding:12px 18px;font-weight:700;font-size:15px;margin-bottom:14px}
  .thms{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .thm{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:12px;padding:15px;box-shadow:var(--sh)}
  .thm.avoid{border-left-color:var(--down)}
  .thm .bh{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .thm.avoid .bh{color:var(--down)}
  .thm .desc{font-size:12.5px;color:var(--t2);margin-bottom:9px}
  .thm .mt{font-size:11.5px;color:var(--t3);margin-bottom:5px}
  .thm .mt b{color:var(--cream);font-weight:600}
  .tks{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .tk2{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--card2);border:1px solid var(--line);color:var(--t2)}
  .tk2.star{color:var(--orange);border-color:rgba(232,99,26,.35);background:rgba(232,99,26,.06)}
  .tk2.dead{color:var(--down);text-decoration:line-through;opacity:.7}

  .plan{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .pk{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--sh);position:relative;overflow:hidden}
  .pk::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange)}
  .pk.sell::before{background:var(--down)}.pk.buy::before{background:var(--up)}
  .pk .nm{font-size:15px;font-weight:800}
  .pk .ps{font-size:19px;font-weight:800;color:var(--orange);margin:5px 0 2px}
  .pk.sell .ps{color:var(--down)}.pk.buy .ps{color:var(--up)}
  .pk .nt{font-size:11.5px;color:var(--t2)}

  .read{display:grid;gap:9px}
  .read .i{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:13px;color:var(--t2);box-shadow:var(--sh);border-left:3px solid var(--gold)}
  .read .i b{color:var(--cream)}
  .rules .i{border-left-color:var(--up)}
  .err{background:rgba(220,58,58,.05);border:1px solid rgba(220,58,58,.25)}
  .err .res{font-size:14px;font-weight:700;color:var(--up);margin:6px 0}
  .tradetab{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
  .tradetab th,.tradetab td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)}
  .tradetab th{color:var(--t3);font-weight:600}
  .assets{font-size:13px;color:var(--t2);margin-top:10px}.assets b{font-size:20px;color:var(--t1)}
  .secret{cursor:pointer;border-bottom:1px dashed var(--line2);user-select:none;transition:.15s}
  .secret:hover{color:var(--orange)}
  .todo{display:grid;gap:7px}
  .todo .i{font-size:12px;color:var(--t2);padding-left:18px;position:relative}
  .todo .i::before{content:"◇";position:absolute;left:0;color:var(--orange)}

  /* 图表 */
  .chart-card .ttl{font-size:13px;color:var(--t2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
  .chart-card .ttl b{color:var(--t1)}
  .chart-card .cap{font-size:11px;color:var(--t3)}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--t2);margin-top:6px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}

  .story .snode{display:grid;grid-template-columns:54px 1fr;gap:14px;align-items:start}
  .story .dd{font-size:15px;font-weight:800;color:var(--orange);text-align:center;padding-top:16px;position:relative}
  .story .dd::after{content:"";position:absolute;left:50%;top:44px;bottom:0;width:2px;background:var(--line2);transform:translateX(-50%)}
  .story .snode:last-child .dd::after{display:none}
  .story .snode .card{margin-bottom:13px}
  .story .tt{font-size:14px;font-weight:800;margin-bottom:5px}
  .story .tx{font-size:12.5px;color:var(--t2)}

  /* 错题本 */
  .mistake-card{border-left:4px solid var(--up)}
  .mistake-card .mh{display:flex;justify-content:space-between;align-items:baseline}
  .mistake-card .mh .t{font-size:15px;font-weight:800;color:var(--up)}
  .mistake-card .mh .dd{font-size:12px;color:var(--t3)}
  .mistake-card .row{font-size:12.5px;color:var(--t2);margin-top:7px}
  .mistake-card .row b{color:var(--cream)}
  .rule-card{border-left:4px solid var(--orange)}
  .rule-card .t{font-size:14px;font-weight:800}
  .rule-card .src{font-size:11px;color:var(--t3);margin-top:2px}
  .rule-card .tx{font-size:12.5px;color:var(--t2);margin-top:6px}

  /* 回顶 */
  #backtop{position:fixed;right:22px;bottom:26px;width:42px;height:42px;border-radius:50%;background:var(--orange);
    color:#fff;border:none;font-size:17px;cursor:pointer;box-shadow:0 6px 18px rgba(232,99,26,.35);
    opacity:0;pointer-events:none;transition:.25s;z-index:70}
  #backtop.show{opacity:1;pointer-events:auto}
  #backtop:hover{transform:translateY(-3px)}

  .kbd-hint{font-size:11px;color:var(--t3);text-align:center;margin-top:26px}
  .kbd-hint kbd{background:var(--card2);border:1px solid var(--line2);border-radius:5px;padding:1px 6px;font-size:10.5px}

  /* ===== 涨停板复盘（板块龙虎+游资）===== */
  .board-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .board-tbl th{background:linear-gradient(135deg,#e8631a,#c84e0f);color:#fff;font-size:12px;font-weight:700;
    padding:9px 10px;text-align:left;white-space:nowrap}
  .board-tbl th:first-child{border-radius:9px 0 0 0}.board-tbl th:last-child{border-radius:0 9px 0 0}
  .board-tbl td{padding:10px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  .board-tbl tr:nth-child(even) td{background:var(--card2)}
  .board-tbl .sctnm{font-weight:800;color:var(--t1);white-space:nowrap}
  .board-tbl .zt{font-weight:800;color:var(--orange);text-align:center;font-size:15px}
  .coblock{min-width:96px}
  .conm{font-size:12.5px;font-weight:700;color:var(--t1);display:flex;align-items:baseline;gap:5px;flex-wrap:wrap}
  .conm small{font-size:10.5px;color:var(--orange);font-weight:600}
  .cotag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:999px;background:rgba(232,99,26,.10);
    color:var(--orange);border:1px solid rgba(232,99,26,.28);font-weight:600;white-space:nowrap}
  .cotag.lowconf{background:rgba(159,148,130,.14);color:var(--t3);border-color:var(--line2)}
  .coticker{display:block;font-size:10px;color:var(--t3);margin-top:2px}
  .codesc{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.4;max-width:170px}
  .codesc.warn{color:var(--up)}

  .sent-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:13px}
  .sent-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .sent-tbl td{padding:8px 10px;border-bottom:1px solid var(--line)}
  .sent-tbl td:first-child{width:88px;font-weight:800;color:var(--cream);background:var(--card2);border-radius:8px 0 0 8px}
  .sent-tbl .names{display:flex;flex-wrap:wrap;gap:6px}
  .stat-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .stat-tbl td{padding:8px 10px;border-bottom:1px solid var(--line)}
  .stat-tbl td:first-child{color:var(--t2)}
  .stat-tbl td:last-child{text-align:right;font-weight:800;color:var(--orange)}

  .hm-group{margin-bottom:11px}
  .hm-group .gh{font-size:12px;font-weight:800;color:var(--cream);margin-bottom:6px;display:flex;align-items:center;gap:7px}
  .hm-group .gh .seat{font-size:10.5px;color:var(--t3);font-weight:500}
  .hm-row{display:grid;grid-template-columns:1fr 1.3fr 90px;gap:8px;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .hm-row .st{font-weight:700;color:var(--t1)}
  .hm-row .seat2{color:var(--t3);font-size:11px}
  .hm-row .amt{text-align:right;font-weight:800}

  @media(max-width:820px){
    .hero{grid-template-columns:1fr}.c3,.c2,.c4,.thms,.plan{grid-template-columns:1fr}.hero h1{font-size:24px}
    .searchbox{width:100%;margin-left:0}.searchbox input{width:100%}.searchbox input:focus{width:100%}
    .sres{width:100%}
    .board-tbl{display:block;overflow-x:auto}.sent-grid{grid-template-columns:1fr}
    .hm-row{grid-template-columns:1fr;gap:2px}
  }
</style>
</head>
<body>

<div class="top"><div class="wrap">
  <div class="brand"><span class="dot"></span>松松复盘日记<span class="sub">私人知识库 · 点日期切换</span>
    <div class="searchbox"><input id="q" type="search" placeholder="搜个股 / 板块，如：寒武纪" autocomplete="off"><div class="sres" id="sres"></div></div>
  </div>
  <div class="ticker" id="ticker"><span style="font-size:12px;color:var(--t3)">实时行情加载中…</span></div>
  <div class="timeline" id="timeline"></div>
</div></div>

<div class="wrap"><div id="view"></div>
  <div class="kbd-hint">提示：<kbd>←</kbd> <kbd>→</kbd> 切换日期 · 链接带日期可直接分享当天</div>
</div>
<button id="backtop" title="回到顶部">↑</button>

<script>
/* ============ 数据 ============ */
const DAYS = [
{
  id:'2026-06-01', d:'6/1', wd:'周一', tradeDay:'5/29收盘',
  q:'高开杀跌·放量破位·高低切换',
  eye:'复盘 5.29收盘 → 计划 6.1',
  tags:[{t:'网下破位·横盘11日',w:1},{t:'成交3.32万亿 ↑11.82%'},{t:'证金护盘 +130亿'},{t:'芯片出逃 −808亿'}],
  idx:[
    {nm:'上证指数',tag:'高开低走',cl:'4068.57',cg:'−0.73%',dir:'down',open:'4110.52',range:'4055.89–4112.96'},
    {nm:'创业板指',tag:'冲高回落',cl:'4037.95',cg:'−2.11%',dir:'down',open:'4141.91 (+0.41%)',range:'4010.12–4158.69'},
    {nm:'科创50',tag:'大幅跳水',cl:'1751.32',cg:'−5.34%',dir:'down',open:'1850.27 (+0.33%)',range:'1727.62–1855.26'}],

  const warnLine = t && t.note ? `<div class="codesc warn">⚠ ${t.note}</div>` : '';
  return `<div class="coblock"><div class="conm">${name}${extra?`<small>${extra}</small>`:''}${tagChip}</div>${tickerTxt}${descLine}${warnLine}</div>`;
}

/* SVG 折线图（带零轴、正负配色、数值标签） */
function lineChart(labels,values,opts){
  const W=560,H=190,P={l:46,r:16,t:22,b:26};
  const vals=values.filter(v=>v!=null);
  let mx=Math.max(...vals),mn=Math.min(...vals);
  if(opts.zero){mx=Math.max(mx,0);mn=Math.min(mn,0)}
  const pad=(mx-mn)*0.18||1;mx+=pad;mn-=pad;
  const X=i=>P.l+(W-P.l-P.r)*(labels.length===1?0.5:i/(labels.length-1));
  const Y=v=>P.t+(H-P.t-P.b)*(1-(v-mn)/(mx-mn));
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`;
  if(opts.zero&&mn<0&&mx>0){const zy=Y(0);s+=`<line x1="${P.l}" y1="${zy}" x2="${W-P.r}" y2="${zy}" stroke="#ddd2bf" stroke-dasharray="4 4"/><text x="${P.l-6}" y="${zy+4}" font-size="10" fill="#9f9482" text-anchor="end">0</text>`;}
  // 折线段（跳过null）
  let segs=[],cur=[];
  values.forEach((v,i)=>{if(v==null){if(cur.length)segs.push(cur),cur=[];}else cur.push([X(i),Y(v),v,i]);});
  if(cur.length)segs.push(cur);
  segs.forEach(seg=>{
    if(seg.length>1){s+=`<polyline fill="none" stroke="${opts.color||'#e8631a'}" stroke-width="2.5" stroke-linejoin="round" points="${seg.map(p=>p[0]+','+p[1]).join(' ')}"/>`;}
  });
  values.forEach((v,i)=>{ if(v==null){s+=`<text x="${X(i)}" y="${H-P.b+16}" font-size="10.5" fill="#9f9482" text-anchor="middle">${labels[i]}</text>`;return;}
    const col=opts.pn?(v>=0?'#dc3a3a':'#159b57'):(opts.color||'#e8631a');
    s+=`<circle cx="${X(i)}" cy="${Y(v)}" r="4.5" fill="${col}"/>`;
    s+=`<text x="${X(i)}" y="${Y(v)-9}" font-size="11" font-weight="700" fill="${col}" text-anchor="middle">${v>0&&opts.pn?'+':''}${v}</text>`;
    s+=`<text x="${X(i)}" y="${H-P.b+16}" font-size="10.5" fill="#9f9482" text-anchor="middle">${labels[i]}</text>`;});
  return s+'</svg>';
}

  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`;
  labels.forEach((lb,i)=>{const x0=P.l+gw*i+gw*0.18,bw=gw*0.26;
    const h1=(H-P.t-P.b)*a[i]/mx,h2=(H-P.t-P.b)*b[i]/mx;
    s+=`<rect x="${x0}" y="${H-P.b-h1}" width="${bw}" height="${h1}" rx="3" fill="#dc3a3a"/>`;
    s+=`<text x="${x0+bw/2}" y="${H-P.b-h1-5}" font-size="10.5" font-weight="700" fill="#dc3a3a" text-anchor="middle">${a[i]}</text>`;
    s+=`<rect x="${x0+bw+5}" y="${H-P.b-h2}" width="${bw}" height="${h2}" rx="3" fill="#159b57"/>`;
    s+=`<text x="${x0+bw+5+bw/2}" y="${H-P.b-h2-5}" font-size="10.5" font-weight="700" fill="#159b57" text-anchor="middle">${b[i]}</text>`;
    s+=`<text x="${P.l+gw*i+gw/2}" y="${H-6}" font-size="10.5" fill="#9f9482" text-anchor="middle">${lb}</text>`;});
  return s+'</svg>';
}

/* ============ 搜索 ============ */
function dayText(day){
  // 提取可搜索文本：板块/个股/计划/主题
  let parts=[];
  (day.flowIn||[]).forEach(x=>parts.push(['资金流入',x.nm+' +'+x.v+'亿']));
  (day.flowOut||[]).forEach(x=>parts.push(['资金流出',x.nm+' −'+x.v+'亿']));
  (day.cUp||[]).forEach(x=>parts.push(['指数贡献·护盘',x.nm+' +'+x.v+(x.pc?' '+x.pc:'')]));
  (day.cDown||[]).forEach(x=>parts.push(['指数贡献·砸盘',x.nm+' −'+x.v+(x.pc?' '+x.pc:'')]));
  (day.plan||[]).forEach(x=>parts.push(['操盘计划',x.nm+' '+x.ps+' · '+x.nt]));
  if(day.themes)(day.themes.items||[]).forEach(t=>{t.tks.forEach(k=>parts.push([t.nm,k.t]));});
  if(day.trades){day.trades.hold.forEach(t=>parts.push(['实盘持仓',t.nm+' '+t.px+'×'+t.qty]));parts.push(['错题',day.trades.mistake.txt]);}
  (day.read||[]).forEach(r=>parts.push(['解读',r.replace(/<[^>]+>/g,'')]));
  return parts;
}
function doSearch(q){
  const box=document.getElementById('sres');
  if(!q||q.trim().length<1){box.classList.remove('show');return;}
  q=q.trim();
  let hits=[];
  DAYS.forEach((day,di)=>{
    dayText(day).forEach(([where,txt])=>{
      const pos=txt.toLowerCase().indexOf(q.toLowerCase());
      if(pos>-1&&hits.length<30){
        const s=Math.max(0,pos-12),e=Math.min(txt.length,pos+q.length+26);
        const frag=(s>0?'…':'')+txt.slice(s,pos)+'<mark>'+txt.slice(pos,pos+q.length)+'</mark>'+txt.slice(pos+q.length,e)+(e<txt.length?'…':'');
        hits.push({di,d:day.d,where,frag});
      }
    });
  });
  box.innerHTML = hits.length
    ? hits.map(x=>`<div class="it" onclick="select('${x.di}');document.getElementById('sres').classList.remove('show');document.getElementById('q').value=''"><div class="dd">${x.d} · ${x.where}</div><div class="tx">${x.frag}</div></div>`).join('')
    : `<div class="none">没搜到「${q}」，换个词试试</div>`;
  box.classList.add('show');
}

/* ============ 路由与构建 ============ */
function jumpSec(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth'});}
function build(){
  const tl=document.getElementById('timeline');
  tl.innerHTML=DAYS.map((d,i)=>`<div class="tl" data-i="${i}"><div class="d">${d.d}<span class="wd">${d.wd}</span></div><div class="q">${d.q}</div></div>`).join('')
    +`<div class="tl flow" data-i="story"><div class="ic">📈</div><div class="lb">脉络/图表</div></div>`
    +`<div class="tl flow" data-i="rules"><div class="ic">📕</div><div class="lb">错题&铁律</div></div>`;
  tl.querySelectorAll('.tl').forEach(el=>el.addEventListener('click',()=>select(el.dataset.i)));
  // URL hash 路由：#2026-06-01 / #story / #rules
  const hash=decodeURIComponent(location.hash.replace('#',''));
  let init=String(DAYS.length-1);
  if(hash==='story'||hash==='rules')init=hash;
  else{const di=DAYS.findIndex(d=>d.id===hash||d.d===hash);if(di>-1)init=String(di);}
  select(init,true);
}
function select(i,noScroll){
  document.querySelectorAll('.tl').forEach(el=>el.classList.toggle('active',el.dataset.i===i));
  const view=document.getElementById('view');
  if(i==='story')view.innerHTML=renderStory();
  else if(i==='rules')view.innerHTML=renderRules();
  else view.innerHTML=renderDay(DAYS[+i]);
  location.hash=(i==='story'||i==='rules')?i:DAYS[+i].id;
  if(!noScroll)window.scrollTo({top:0,behavior:'smooth'});
}
/* 键盘左右切换 */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const act=document.querySelector('.tl.active');if(!act)return;
  const order=[...document.querySelectorAll('.tl')].map(el=>el.dataset.i);
  let idx=order.indexOf(act.dataset.i);
  if(e.key==='ArrowLeft'&&idx>0)select(order[idx-1]);
  if(e.key==='ArrowRight'&&idx<order.length-1)select(order[idx+1]);
});

  IDX_LIVE.forEach(x=>{
    const raw=window['v_'+x.code];if(!raw)return;ok=true;
    const a=raw.split('~');const px=parseFloat(a[3]),prev=parseFloat(a[4]);
    if(!px){return;}
    const pct=prev?(px-prev)/prev*100:0;const up=pct>=0,col=up?'#dc3a3a':'#159b57';
    if(!ts)ts=liveTime(a[30]);
    cards+=`<div class="lq"><span class="nm">${x.nm}</span><span class="px" style="color:${col}">${px.toFixed(2)}</span><span class="pc" style="color:${col}">${up?'+':''}${pct.toFixed(2)}%</span></div>`;
  });
  if(!ok){box.innerHTML='<span style="font-size:12px;color:var(--up)">⚠ 实时行情暂时取不到</span> <span class="rf" onclick="loadLive()">↻ 重试</span>';return;}
  box.innerHTML=cards+`<div class="meta"><span class="live">实时</span><span>${ts||'数据时间未知'}</span><span class="rf" onclick="loadLive()">↻ 刷新</span></div>`;
}
function loadLive(){
  const box=document.getElementById('ticker');if(!box)return;
  const s=document.createElement('script');s.charset='gbk';
  s.src='https://qt.gtimg.cn/q='+IDX_LIVE.map(x=>x.code).join(',')+'&r='+Date.now();
  s.onload=()=>{renderLive();s.remove();};
  s.onerror=()=>{box.innerHTML='<span style="font-size:12px;color:var(--up)">⚠ 实时行情加载失败（可能网络限制）</span> <span class="rf" onclick="loadLive()">↻ 重试</span>';s.remove();};
  document.body.appendChild(s);
}
loadLive();
setInterval(loadLive,60000);  // 盘中每60秒自动刷新

build();
</script>
</body>
</html>
