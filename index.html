<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松松复盘日记 · 归档看板</title>
<meta name="description" content="松松复盘日记——私人交易复盘知识库：每日大盘/资金/情绪归档、涨停板复盘、错题本与交易铁律库">
<meta property="og:title" content="松松复盘日记 · 归档看板">
<meta property="og:description" content="每日大盘/资金/情绪归档、涨停板复盘、错题本与交易铁律库">
<style>
  /* ============================================================
     松松复盘日记 · 归档看板 — Rise 设计语言
     衬线大标题 + 暖米大地色（森林墨绿/陶土橙/鼠尾草绿）+ 松林淡底 + 大留白
     与「热点先锋标的跟踪看板」同一套视觉体系
     ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700;900&display=swap');
  :root{
    --bg:#f1ede4; --bg2:#e7e0d1; --card:#faf8f2; --card2:#efeadc; --card-solid:#fffefb;
    --line:#e5dfd0; --line2:#d8d0bd;
    --forest:#1f2c20; --forest2:#2c3d2d;
    --orange:#c4753a; --orange-l:#d08a52; --gold:#a35e2a; --cream:#a35e2a;
    --up:#bf4a30; --down:#4f8456; --t1:#1f2c20; --t2:#47513f; --t3:#867f6d;
    --serif:"Noto Serif SC","Songti SC","Source Han Serif SC",Georgia,"Times New Roman",serif;
    --sh:0 2px 10px -4px rgba(40,48,32,.10),0 4px 18px -10px rgba(40,48,32,.07);
    --sh2:0 10px 30px -12px rgba(40,48,32,.18),0 22px 50px -26px rgba(40,48,32,.2);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,sans-serif;
    background:
      linear-gradient(180deg,rgba(243,239,231,.52) 0%,rgba(243,239,231,.76) 24%,rgba(243,239,231,.90) 50%,rgba(243,239,231,.94) 100%) fixed,
      url('assets/hero-pine.jpg') center top / cover fixed,
      var(--bg);
    color:var(--t1);line-height:1.7;min-height:100vh;padding-bottom:60px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:0 auto;padding:0 22px}
  .up{color:var(--up)}.down{color:var(--down)}.org{color:var(--orange)}
  .mono{font-variant-numeric:tabular-nums}

  .top{position:sticky;top:0;z-index:50;background:rgba(241,237,228,.85);backdrop-filter:blur(14px) saturate(1.2);-webkit-backdrop-filter:blur(14px) saturate(1.2);border-bottom:1px solid var(--line)}
  .top .wrap{padding-top:12px;padding-bottom:11px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;margin-bottom:10px;flex-wrap:wrap}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--orange)}
  .brand .sub{font-size:11px;color:var(--t3);font-weight:500}
  /* 搜索 */
  .searchbox{margin-left:auto;position:relative}
  .searchbox input{width:230px;padding:7px 12px 7px 30px;border:1px solid var(--line2);border-radius:999px;
    background:var(--card);font-size:12.5px;color:var(--t1);outline:none;transition:.2s}
  .searchbox input:focus{border-color:var(--orange);width:280px}
  .searchbox::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.5}
  .sres{position:absolute;right:0;top:38px;width:340px;max-height:380px;overflow-y:auto;background:var(--card);
    border:1px solid var(--line2);border-radius:13px;box-shadow:var(--sh2);display:none;z-index:60}
  .sres.show{display:block}
  .sres .it{padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
  .sres .it:hover{background:var(--card2)}
  .sres .it .dd{font-size:12px;font-weight:800;color:var(--orange)}
  .sres .it .tx{font-size:12px;color:var(--t2);margin-top:2px}
  .sres .it .tx mark{background:rgba(196,117,58,.18);color:var(--cream);border-radius:3px;padding:0 2px}
  .sres .none{padding:14px;font-size:12.5px;color:var(--t3);text-align:center}

  /* ===== 实时行情：一行文字带，不装盒 ===== */
  .ticker{display:flex;gap:18px;align-items:baseline;flex-wrap:wrap;margin-bottom:9px;font-size:12.5px;color:var(--t2)}
  .ticker .lq{display:flex;align-items:baseline;gap:6px}
  .ticker .lq .nm{font-size:11.5px;color:var(--t3)}
  .ticker .lq .px{font-family:var(--serif);font-size:14.5px;font-weight:700;font-variant-numeric:tabular-nums}
  .ticker .lq .pc{font-size:11.5px;font-weight:700}
  .ticker .meta{margin-left:auto;font-size:11px;color:var(--t3);display:flex;align-items:center;gap:9px}
  .ticker .live{display:inline-flex;align-items:center;gap:5px;color:var(--down);font-weight:600}
  .ticker .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--down);animation:livep 1.6s infinite}
  @keyframes livep{0%,100%{opacity:1}50%{opacity:.25}}
  .ticker .rf{cursor:pointer;border:none;background:none;padding:0;font-size:11px;color:var(--t3);text-decoration:underline dotted}
  .ticker .rf:hover{color:var(--orange)}
  /* ===== 日期页签：细pill，选中=森林墨绿实底 ===== */
  .timeline{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;align-items:stretch}
  .tl{flex:0 0 auto;max-width:200px;background:none;border:1px solid transparent;border-radius:999px;
    padding:6px 15px;cursor:pointer;transition:.22s;display:flex;flex-direction:column;justify-content:center}
  .tl:hover{border-color:var(--line2);background:var(--card2)}
  .tl .d{font-family:var(--serif);font-size:13.5px;font-weight:700;display:flex;align-items:baseline;gap:6px;color:var(--t2);white-space:nowrap}
  .tl .d .wd{font-size:10px;color:var(--t3);font-weight:500}
  .tl .q{display:none;font-size:10.5px;line-height:1.4;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tl.active{background:var(--forest);border-color:var(--forest);border-radius:14px;padding:7px 16px}
  .tl.active .d{color:#f1ede4}
  .tl.active .q{display:block;color:rgba(241,237,228,.72)}
  .tl.flow{flex-direction:row;gap:6px;align-items:center}
  .tl.flow .ic{font-size:14px}
  .tl.flow .lb{font-size:12px;font-weight:700;font-family:var(--serif);color:var(--t2)}
  .tl.flow.active .lb{color:#f1ede4}

  /* ===== HERO：全页视觉锚点，结论最大 ===== */
  #view{padding-top:30px}
  .hero{display:grid;grid-template-columns:1.6fr .8fr;gap:44px;align-items:center;padding:16px 0 8px}
  .hero .eye{font-size:12.5px;letter-spacing:3px;color:var(--gold);font-weight:600}
  .hero h1{font-family:var(--serif);font-size:44px;font-weight:600;line-height:1.24;letter-spacing:1px;margin:14px 0 0;color:var(--t1)}
  .hero .sub{margin-top:18px;font-size:13.5px;color:var(--t2);line-height:2;max-width:640px}
  .hero .sub .warn{color:var(--up);font-weight:600}
  .hero .sub .sep{color:var(--line2);margin:0 9px}
  .gauge{position:relative;width:158px;height:158px;margin:0 auto}
  .gauge .lab{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .n{font-family:var(--serif);font-size:44px;font-weight:700;color:var(--orange);line-height:1}
  .gauge .c{font-size:11px;color:var(--t2);margin-top:5px;text-align:center;padding:0 12px}

  /* 小节导航：开放式文字链 */
  .secnav{display:flex;flex-wrap:wrap;gap:4px 18px;margin-top:26px;padding-top:14px;border-top:1px solid var(--line2)}
  .secnav a{font-size:12px;padding:2px 0;color:var(--t3);text-decoration:none;transition:.15s;border-bottom:1px solid transparent}
  .secnav a:hover{color:var(--orange);border-bottom-color:var(--orange)}

  /* ===== 章节：编号 01/02… 做节奏，留白翻倍 ===== */
  section{padding:44px 0 4px;border-top:none;scroll-margin-top:150px}
  .sh{display:flex;align-items:baseline;gap:14px;margin-bottom:24px;flex-wrap:wrap;border-bottom:1px solid var(--line2);padding-bottom:13px}
  .sh .num{font-family:var(--serif);font-size:14px;color:var(--orange);font-weight:700;letter-spacing:1px}
  .sh h2{font-family:var(--serif);font-size:23px;font-weight:600;letter-spacing:.8px}
  .sh .en{font-size:10.5px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
  .grid{display:grid;gap:18px}
  .c3{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:1fr 1fr}.c4{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;box-shadow:var(--sh)}

  /* ===== 指数横带：一张卡三栏细线分隔 ===== */
  .idxstrip{display:grid;grid-template-columns:repeat(3,1fr);background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);overflow:hidden}
  .idxcell{padding:24px 28px;border-left:1px solid var(--line2)}
  .idxcell:first-child{border-left:none}
  .idxcell .nm{font-size:13px;color:var(--t2);display:flex;justify-content:space-between;align-items:center}
  .idxcell .tag{font-size:10.5px;padding:1px 7px;border-radius:5px;background:rgba(191,74,48,.1);color:var(--up);white-space:nowrap}
  .idxcell .tag.u{background:rgba(79,132,86,.1);color:var(--down)}
  .idxcell .cl{font-family:var(--serif);font-size:37px;font-weight:700;letter-spacing:-.5px;margin-top:8px;line-height:1.1}
  .idxcell .cg{font-size:14.5px;font-weight:700;margin-top:3px}
  .idxcell .ex{font-size:11.5px;color:var(--t3);margin-top:12px;display:grid;gap:3px}
  .idxcell .ex .r{display:flex;justify-content:space-between}
  /* ===== 关键统计带：开放式，不装盒 ===== */
  .statstrip{display:flex;flex-wrap:wrap;margin-top:22px}
  .statstrip .s{flex:1;min-width:160px;padding:4px 30px 4px 0;margin:6px 30px 6px 0;border-right:1px solid var(--line2)}
  .statstrip .s:last-child{border-right:none;margin-right:0}
  .statstrip .k{font-size:11.5px;color:var(--t3);letter-spacing:.5px}
  .statstrip .v{font-family:var(--serif);font-size:27px;font-weight:700;margin-top:3px;color:var(--t1)}
  .statstrip .d{font-size:11.5px;color:var(--t2);margin-top:1px}
  .capnote{font-size:11.5px;color:var(--t3);margin-top:14px;line-height:1.8;max-width:860px}
  /* ===== 解读：专栏体，大序号+通栏文字，不装盒 ===== */
  .essay{max-width:780px}
  .essay .item{display:grid;grid-template-columns:56px 1fr;gap:20px;padding:22px 0;border-bottom:1px dashed var(--line2);align-items:start}
  .essay .item:last-child{border-bottom:none}
  .essay .n{font-family:var(--serif);font-size:32px;font-weight:700;color:rgba(196,117,58,.5);line-height:1;padding-top:2px}
  .essay .tx{font-size:14px;color:var(--t2);line-height:2}
  .essay .tx b{color:var(--t1)}
  /* ===== 铁律：引文体 ===== */
  .pull{max-width:780px}
  .pull .i{border-left:3px solid var(--up);padding:4px 0 4px 20px;margin:18px 0;font-size:14px;color:var(--t2);line-height:1.95;background:none;box-shadow:none;border-radius:0;border-top:none;border-right:none;border-bottom:none}
  .pull .i b{color:var(--t1)}
  /* ===== 待核对：折叠脚注 ===== */
  .foot{margin-top:44px;border-top:1px solid var(--line2);padding-top:14px}
  .foot summary{cursor:pointer;font-size:12.5px;color:var(--t3);user-select:none}
  .foot summary:hover{color:var(--orange)}
  .foot .todo{margin-top:14px}
  /* 双栏合一卡 */
  .duo{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .duo>div{padding:0 26px 0 0}
  .duo>div:last-child{border-left:1px solid var(--line2);padding:0 0 0 26px}
  .idx .nm{font-size:13px;color:var(--t2);display:flex;justify-content:space-between}
  .idx .tag{font-size:10.5px;padding:1px 6px;border-radius:5px;background:rgba(191,74,48,.1);color:var(--up)}
  .idx .tag.u{background:rgba(79,132,86,.1);color:var(--down)}
  .idx .cl{font-size:25px;font-weight:800;margin:5px 0 1px}
  .idx .cg{font-size:14px;font-weight:700}
  .idx .ex{font-size:11.5px;color:var(--t3);margin-top:7px;display:grid;gap:2px}
  .idx .ex .r{display:flex;justify-content:space-between}
  .stat .k{font-size:11.5px;color:var(--t3)}
  .stat .v{font-size:20px;font-weight:800;margin:3px 0 1px}
  .stat .d{font-size:11px;color:var(--t2)}
  .vs{display:flex;height:36px;border-radius:9px;overflow:hidden;margin:4px 0}
  .vs .l{background:var(--up);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;min-width:76px;white-space:nowrap;padding:0 6px}
  .vs .r{background:var(--down);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;min-width:76px;white-space:nowrap;padding:0 6px}
  .ladder{display:grid;gap:7px;margin-top:6px}
  .step{display:flex;align-items:center;gap:10px}
  .step .lv{font-size:11px;color:var(--t3);width:30px}
  .step .bw{flex:1;height:25px;background:var(--card2);border:1px solid var(--line);border-radius:6px;overflow:hidden;position:relative}
  .step .fl{height:100%;display:flex;align-items:center;padding:0 11px;font-size:11.5px;font-weight:600;color:#fff;white-space:nowrap}
  .step.brk .bw{border:1px dashed rgba(191,74,48,.5);background:rgba(191,74,48,.04)}
  .step.brk .em{position:absolute;inset:0;display:flex;align-items:center;padding-left:11px;color:var(--up);font-size:11.5px;font-weight:600}
  .chip{display:inline-block;font-size:11.5px;padding:4px 10px;border-radius:7px;background:var(--card2);border:1px solid var(--line);color:var(--t2);margin:4px 5px 0 0}
  .chip.hot{color:var(--orange);border-color:rgba(196,117,58,.3)}
  .fl{display:grid;gap:8px}
  .fl .r{display:grid;grid-template-columns:104px 1fr 60px;align-items:center;gap:9px;font-size:12.5px}
  .fl .nm{color:var(--t2);text-align:right}
  .fl .tk{height:20px;background:var(--card2);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .fl .f{height:100%;border-radius:5px}
  .fl .v{font-weight:700;font-size:12px}
  .stk{display:grid;grid-template-columns:78px 1fr 78px;align-items:center;gap:8px;margin-bottom:6px;font-size:12.5px}
  .stk .tk{height:15px;background:var(--card2);border-radius:4px;overflow:hidden}
  .stk .f{height:100%}
  .stk .pt{text-align:right;font-weight:700;font-size:11.5px}
  .stk .pt small{color:var(--t3);font-weight:500}

  .banner{background:linear-gradient(135deg,#c4753a,#a35e2a);color:#fff;border-radius:12px;padding:12px 18px;font-weight:700;font-size:15px;margin-bottom:14px}
  .thms{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .thm{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--orange);border-radius:12px;padding:15px;box-shadow:var(--sh)}
  .thm.avoid{border-left-color:var(--down)}
  .thm .bh{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .thm.avoid .bh{color:var(--down)}
  .thm .desc{font-size:12.5px;color:var(--t2);margin-bottom:9px}
  .thm .mt{font-size:11.5px;color:var(--t3);margin-bottom:5px}
  .thm .mt b{color:var(--cream);font-weight:600}
  .tks{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .tk2{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--card2);border:1px solid var(--line);color:var(--t2)}
  .tk2.star{color:var(--orange);border-color:rgba(196,117,58,.35);background:rgba(196,117,58,.06)}
  .tk2.dead{color:var(--down);text-decoration:line-through;opacity:.7}

  .plan{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .pk{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--sh);position:relative;overflow:hidden}
  .pk::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange)}
  .pk.sell::before{background:var(--down)}.pk.buy::before{background:var(--up)}
  .pk .nm{font-size:15px;font-weight:800}
  .pk .ps{font-size:19px;font-weight:800;color:var(--orange);margin:5px 0 2px}
  .pk.sell .ps{color:var(--down)}.pk.buy .ps{color:var(--up)}
  .pk .nt{font-size:11.5px;color:var(--t2)}

  .read{display:grid;gap:9px}
  .read .i{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:13px;color:var(--t2);box-shadow:var(--sh);border-left:3px solid var(--gold)}
  .read .i b{color:var(--cream)}
  .rules .i{border-left-color:var(--up)}
  .err{background:rgba(191,74,48,.05);border:1px solid rgba(191,74,48,.25)}
  .err .res{font-size:14px;font-weight:700;color:var(--up);margin:6px 0}
  .tradetab{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
  .tradetab th,.tradetab td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)}
  .tradetab th{color:var(--t3);font-weight:600}
  .assets{font-size:13px;color:var(--t2);margin-top:10px}.assets b{font-size:20px;color:var(--t1)}
  .secret{cursor:pointer;border-bottom:1px dashed var(--line2);user-select:none;transition:.15s}
  .secret:hover{color:var(--orange)}
  .todo{display:grid;gap:7px}
  .todo .i{font-size:12px;color:var(--t2);padding-left:18px;position:relative}
  .todo .i::before{content:"◇";position:absolute;left:0;color:var(--orange)}

  /* 图表 */
  .chart-card .ttl{font-size:13px;color:var(--t2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
  .chart-card .ttl b{color:var(--t1)}
  .chart-card .cap{font-size:11px;color:var(--t3)}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--t2);margin-top:6px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}

  .story .snode{display:grid;grid-template-columns:54px 1fr;gap:14px;align-items:start}
  .story .dd{font-size:15px;font-weight:800;color:var(--orange);text-align:center;padding-top:16px;position:relative}
  .story .dd::after{content:"";position:absolute;left:50%;top:44px;bottom:0;width:2px;background:var(--line2);transform:translateX(-50%)}
  .story .snode:last-child .dd::after{display:none}
  .story .snode .card{margin-bottom:13px}
  .story .tt{font-size:14px;font-weight:800;margin-bottom:5px}
  .story .tx{font-size:12.5px;color:var(--t2)}

  /* 错题本 */
  .mistake-card{border-left:4px solid var(--up)}
  .mistake-card .mh{display:flex;justify-content:space-between;align-items:baseline}
  .mistake-card .mh .t{font-size:15px;font-weight:800;color:var(--up)}
  .mistake-card .mh .dd{font-size:12px;color:var(--t3)}
  .mistake-card .row{font-size:12.5px;color:var(--t2);margin-top:7px}
  .mistake-card .row b{color:var(--cream)}
  .rule-card{border-left:4px solid var(--orange)}
  .rule-card .t{font-size:14px;font-weight:800}
  .rule-card .src{font-size:11px;color:var(--t3);margin-top:2px}
  .rule-card .tx{font-size:12.5px;color:var(--t2);margin-top:6px}

  /* 回顶 */
  #backtop{position:fixed;right:22px;bottom:26px;width:42px;height:42px;border-radius:50%;background:var(--orange);
    color:#fff;border:none;font-size:17px;cursor:pointer;box-shadow:0 6px 18px rgba(196,117,58,.35);
    opacity:0;pointer-events:none;transition:.25s;z-index:70}
  #backtop.show{opacity:1;pointer-events:auto}
  #backtop:hover{transform:translateY(-3px)}

  .kbd-hint{font-size:11px;color:var(--t3);text-align:center;margin-top:26px}

function toggleTag(el){ const d=el&&el.nextElementSibling; if(d&&d.classList.contains('cod'))d.classList.toggle('show'); }
function coCell(name, extra){
  if(!name)return'';
  const t = TAGS[name];
  const nameHtml = `<span class="con">${name}${extra?`<small>${extra}</small>`:''}</span>`;
  if(!t) return `<span class="co">${nameHtml}</span>`;
  const tagChip = `<span class="cot ${t.conf==='low'?'lowconf':''}" onclick="toggleTag(this)">${t.tag||'详情'}</span>`;
  const descBody = `${t.desc?t.desc:''}${t.ticker?` <span class="tk mono">${t.ticker}</span>`:''}${t.note?`<span class="wn">⚠ ${t.note}</span>`:''}`;
  return `<span class="co">${nameHtml}${tagChip}<span class="cod">${descBody}</span></span>`;
}
function renderBoard(b){
  // 板块龙虎榜（紧凑标准表格，与原图一致）
  let h=`<div class="card"><div class="board-wrap"><table class="board-tbl">
    <caption>板块涨停板复盘 (${b.date})</caption>
    <tr><th>板块</th><th>涨停数量</th><th>龙一</th><th>龙二</th><th>龙三</th><th>日内龙头</th></tr>
    ${b.sectors.map(s=>`<tr><td class="sctnm">${s.name}</td><td class="zt mono">${s.zt}</td><td>${coCell(s.long1)}</td><td>${coCell(s.long2)}</td><td>${coCell(s.long3)}</td><td>${coCell(s.intraday)}</td></tr>`).join('')}
    </table></div></div>`;

  // 市场情绪：一张四列表，左边连板核心，右边情绪指标（还原原图左右对齐结构）
  if(b.sentiment){
    const leftRows=[...b.sentiment.ladder.map(l=>({cat:l.lv,val:l.names.map(n=>coCell(n)).join('、')}))];
    if(b.sentiment.fanbao)leftRows.push({cat:'反包走势',val:b.sentiment.fanbao.map(f=>coCell(f.name,f.info)).join('、')});
    const rightRows=b.sentiment.stats;
    const rows=Math.max(leftRows.length,rightRows.length);
    let body='';
    for(let i=0;i<rows;i++){
      const l=leftRows[i], r=rightRows[i];
      const vcls = r ? (/^[-−]/.test(r.v) ? 'down' : /^[+＋]/.test(r.v) ? 'up' : '') : '';
      body+=`<tr>
        <td class="cat">${l?l.cat:''}</td><td>${l?l.val:''}</td>
        <td class="cat">${r?r.k:''}</td><td class="num ${vcls}">${r?r.v:''}</td>
      </tr>`;
    }
    h+=`<div class="card" style="margin-top:13px"><div class="board-wrap"><table class="board-tbl">
      <caption>市场情绪</caption>
      <tr><th>连板核心</th><th>标的</th><th>情绪指标</th><th>数值</th></tr>
      ${body}
    </table></div></div>`;
  }

  // 龙虎榜游资动向：真实 rowspan 表格（游资类型 | 游资名称 | 股票名称 | 席位 | 金额），还原原图列结构
  if(b.hotMoney&&b.hotMoney.length){
    const rows=[];
    b.hotMoney.forEach(g=>{
      g.rows.forEach((r,i)=>rows.push({type:g.type,name:g.name,first:i===0,typeFirst:false,r}));
    });
    // 标记每个"游资类型"块的首行 + 该块总行数；每个"游资名称"子块的首行 + 子块行数
    let i=0;
    while(i<rows.length){
      let j=i; while(j<rows.length && rows[j].type===rows[i].type) j++;
      rows[i].typeFirst=true; rows[i].typeSpan=j-i;
      let k=i;
      while(k<j){
        let m=k; while(m<j && rows[m].name===rows[k].name) m++;
        rows[k].nameSpan=m-k;
        k=m;
      }
      i=j;
    }
    const body=rows.map(row=>{
      const r=row.r;
      let tds='';
      if(row.typeFirst) tds+=`<td class="cat" rowspan="${row.typeSpan}">${row.type}</td>`;
      if(row.nameSpan) tds+=`<td class="cat" rowspan="${row.nameSpan}">${row.name||'—'}</td>`;
      tds+=`<td>${coCell(r.stock)}</td><td class="seat">${r.seat||''}</td><td class="num ${r.amt>=0?'up':'down'}">${r.label}</td>`;
      return `<tr>${tds}</tr>`;
    }).join('');
    h+=`<div class="card" style="margin-top:13px"><div class="board-wrap"><table class="board-tbl">
      <caption>龙虎榜主要游资动向</caption>
      <tr><th>游资类型</th><th>游资名称</th><th>股票名称</th><th>席位</th><th>金额</th></tr>
      ${body}
    </table></div></div>`;
  }
  return h;
}

function maxAbs(a){if(!a||!a.length)return 1;const m=Math.max.apply(null,a.map(x=>Math.abs(x.v)));return (isFinite(m)&&m>0)?m:1}
function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function flowRows(items,color){const m=maxAbs(items);
  return items.map(x=>`<div class="r"><span class="nm">${x.nm}</span><div class="tk"><div class="f" style="width:${Math.abs(x.v)/m*100}%;background:${color}"></div></div><span class="v" style="color:${color}">${x.v>0?'+':'−'}${Math.abs(x.v)}</span></div>`).join('')}
function stkRows(items,color,sign){const m=maxAbs(items);
  return items.map(x=>`<div class="stk"><span>${x.nm}</span><div class="tk"><div class="f" style="width:${Math.abs(x.v)/m*100}%;background:${color}"></div></div><span class="pt" style="color:${color}">${sign}${x.v} ${x.pc?`<small>${x.pc}</small>`:''}</span></div>`).join('')}

/* SVG 折线图（带零轴、正负配色、数值标签） */
function lineChart(labels,values,opts){
  const W=560,H=190,P={l:46,r:16,t:22,b:26};
  const vals=values.filter(v=>v!=null);
  let mx=Math.max(...vals),mn=Math.min(...vals);
  if(opts.zero){mx=Math.max(mx,0);mn=Math.min(mn,0)}
  const pad=(mx-mn)*0.18||1;mx+=pad;mn-=pad;
  const X=i=>P.l+(W-P.l-P.r)*(labels.length===1?0.5:i/(labels.length-1));
  const Y=v=>P.t+(H-P.t-P.b)*(1-(v-mn)/(mx-mn));
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`;
  if(opts.zero&&mn<0&&mx>0){const zy=Y(0);s+=`<line x1="${P.l}" y1="${zy}" x2="${W-P.r}" y2="${zy}" stroke="#d8d0bd" stroke-dasharray="4 4"/><text x="${P.l-6}" y="${zy+4}" font-size="10" fill="#867f6d" text-anchor="end">0</text>`;}
  // 折线段（跳过null）
  let segs=[],cur=[];
  values.forEach((v,i)=>{if(v==null){if(cur.length)segs.push(cur),cur=[];}else cur.push([X(i),Y(v),v,i]);});
  if(cur.length)segs.push(cur);
  segs.forEach(seg=>{
    if(seg.length>1){s+=`<polyline fill="none" stroke="${opts.color||'#c4753a'}" stroke-width="2.5" stroke-linejoin="round" points="${seg.map(p=>p[0]+','+p[1]).join(' ')}"/>`;}
  });
  values.forEach((v,i)=>{ if(v==null){s+=`<text x="${X(i)}" y="${H-P.b+16}" font-size="10.5" fill="#867f6d" text-anchor="middle">${labels[i]}</text>`;return;}
    const col=opts.pn?(v>=0?'#bf4a30':'#4f8456'):(opts.color||'#c4753a');
    s+=`<circle cx="${X(i)}" cy="${Y(v)}" r="4.5" fill="${col}"/>`;
    s+=`<text x="${X(i)}" y="${Y(v)-9}" font-size="11" font-weight="700" fill="${col}" text-anchor="middle">${v>0&&opts.pn?'+':''}${v}</text>`;
    s+=`<text x="${X(i)}" y="${H-P.b+16}" font-size="10.5" fill="#867f6d" text-anchor="middle">${labels[i]}</text>`;});
  return s+'</svg>';
}
/* 简易分组柱图（涨停/跌停） */
function barChart(labels,a,b){
  const W=560,H=170,P={l:36,r:10,t:18,b:24};
  const vals=[...a,...b].filter(v=>v!=null&&isFinite(v));
  const mx=(vals.length?Math.max(...vals):1)*1.15||1;
  const gw=(W-P.l-P.r)/labels.length;
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`;
  labels.forEach((lb,i)=>{const x0=P.l+gw*i+gw*0.18,bw=gw*0.26;
    s+=`<text x="${P.l+gw*i+gw/2}" y="${H-6}" font-size="10.5" fill="#867f6d" text-anchor="middle">${lb}</text>`;
    if(a[i]==null&&b[i]==null){s+=`<text x="${P.l+gw*i+gw/2}" y="${H-P.b-8}" font-size="10" fill="#aaa08d" text-anchor="middle">未记</text>`;return;}
    if(a[i]!=null){const h1=(H-P.t-P.b)*a[i]/mx;
      s+=`<rect x="${x0}" y="${H-P.b-h1}" width="${bw}" height="${h1}" rx="3" fill="#bf4a30"/>`;
      s+=`<text x="${x0+bw/2}" y="${H-P.b-h1-5}" font-size="10.5" font-weight="700" fill="#bf4a30" text-anchor="middle">${a[i]}</text>`;}
    if(b[i]!=null){const h2=(H-P.t-P.b)*b[i]/mx;
      s+=`<rect x="${x0+bw+5}" y="${H-P.b-h2}" width="${bw}" height="${h2}" rx="3" fill="#4f8456"/>`;
      s+=`<text x="${x0+bw+5+bw/2}" y="${H-P.b-h2-5}" font-size="10.5" font-weight="700" fill="#4f8456" text-anchor="middle">${b[i]}</text>`;}
  });
  return s+'</svg>';
}

      `<div class="banner">主线：${day.flowMain}</div><div class="thms">${day.themes.items.map(t=>`<div class="thm ${t.avoid?'avoid':''}"><div class="bh">${t.ic} ${t.nm}</div><div class="desc">${t.desc}</div>${t.mts.map(m=>`<div class="mt">${m.k}：<b>${m.v}</b></div>`).join('')}<div class="tks">${t.tks.map(k=>`<span class="tk2 ${k.c||''}">${k.t}</span>`).join('')}</div></div>`).join('')}</div>`);
  }
  if(day.plan&&day.plan.length){h+=sec('plan',day.planTitle||(day.trades?'操盘计划 · 修正':'操盘计划 · 推荐票'),'Positions',
    `<div class="plan">${day.plan.map(p=>`<div class="pk ${p.type||''}"><div class="nm">${p.nm}</div><div class="ps">${p.ps}</div><div class="nt">${p.nt}</div></div>`).join('')}</div>`);}
  if(day.rules){h+=sec('rule','交易铁律 · 从错题提炼','Rules',`<div class="pull">${day.rules.map(r=>`<div class="i">${r}</div>`).join('')}</div>`);}
  h+=sec('read','我的解读 · 风格符合度','Analysis',`<div class="essay">${day.read.map((r,i)=>`<div class="item"><div class="n">${String(i+1).padStart(2,'0')}</div><div class="tx">${r}</div></div>`).join('')}</div>`);
  if(day.todo){h+=`<details class="foot" id="todo"><summary>待核对（准确铁律）· ${day.todo.length} 项 · 点开查看</summary><div class="todo">${day.todo.map(t=>`<div class="i">${t}</div>`).join('')}</div></details>`;}
  return h;
}

      <div class="card chart-card"><div class="ttl"><b>恐慌指数</b><span class="cap">29 → 23（其后未记）</span></div>${lineChart(TREND.labels,TREND.fear,{color:'#c4753a'})}</div></div>
    <div class="card chart-card" style="margin-top:13px"><div class="ttl"><b>涨停（红） vs 跌停（绿）家数</b><span class="cap">情绪结构变化（6/29未记全市场数据，图截至6/12）</span></div>${barChart(TREND.labels.slice(0,TREND.zt.length),TREND.zt,TREND.dt)}
    <div style="font-size:12px;color:var(--t2);margin-top:6px">5/29 涨49/跌50（杀跌）→ 6/1 涨停118（个股修复但指数跌）→ 6/2 涨停64跌停仅7（指数涨但小票被抽血）→ 6/12 涨停88跌停15（全面转暖）。<b style="color:var(--cream)">涨跌停结构比指数更真实。</b></div></div>`);
  const nodes = DAYS.map(d=>`<div class="snode"><div class="dd">${d.d}</div><div class="card"><div class="tt">${d.q}</div><div class="tx"><b>主线：</b>${d.flowMain}</div></div></div>`).join('');
  h+=sec('s3','主线演进','Evolution',`<div class="story">${nodes}</div><div style="font-size:11.5px;color:var(--t3);text-align:center;margin-top:8px">每天的资金主线都在变、方向反复——这就是为什么「单日不外推、当日认错」是铁律。</div>`);
  const navrows = NAV.map(n=>`<tr><td>${n.d}</td><td><span class="mono secret" data-val="${escHtml(n.a)}" onclick="toggleSecret(this)">＊＊＊＊＊＊</span></td><td>${n.chg}</td></tr>`).join('');

/* ============ 错题本 & 铁律库 ============ */

/* ============ 搜索 ============ */
function dayText(day){
  // 提取可搜索文本：板块/个股/计划/主题
  let parts=[];
  (day.flowIn||[]).forEach(x=>parts.push(['资金流入',x.nm+' +'+x.v+'亿']));
  (day.flowOut||[]).forEach(x=>parts.push(['资金流出',x.nm+' −'+x.v+'亿']));
  (day.cUp||[]).forEach(x=>parts.push(['指数贡献·护盘',x.nm+' +'+x.v+(x.pc?' '+x.pc:'')]));
  (day.cDown||[]).forEach(x=>parts.push(['指数贡献·砸盘',x.nm+' −'+x.v+(x.pc?' '+x.pc:'')]));
  (day.plan||[]).forEach(x=>parts.push(['操盘计划',x.nm+' '+x.ps+' · '+x.nt]));
  if(day.themes)(day.themes.items||[]).forEach(t=>{t.tks.forEach(k=>parts.push([t.nm,k.t]));});
  if(day.trades){(day.trades.hold||[]).forEach(t=>parts.push(['实盘持仓',t.nm+' '+t.px+'×'+t.qty]));if(day.trades.mistake)parts.push(['错题',day.trades.mistake.txt]);}
  if(day.board){
    (day.board.sectors||[]).forEach(s=>parts.push(['涨停板·'+s.name,[s.long1,s.long2,s.long3,s.intraday].filter(Boolean).join('、')+' · 涨停'+s.zt+'家']));
    const st=day.board.sentiment;
    if(st){(st.ladder||[]).forEach(l=>parts.push(['连板·'+l.lv,(l.names||[]).join('、')]));
      (st.fanbao||[]).forEach(f=>parts.push(['反包走势',f.name+' '+(f.info||'')]));}
    (day.board.hotMoney||[]).forEach(g=>(g.rows||[]).forEach(r=>parts.push(['龙虎榜·'+g.type,(g.name?g.name+' · ':'')+r.stock+' '+(r.seat||'')+' '+(r.label||'')])));
  }
  (day.rules||[]).forEach(r=>parts.push(['铁律',r.replace(/<[^>]+>/g,'')]));
  (day.read||[]).forEach(r=>parts.push(['解读',r.replace(/<[^>]+>/g,'')]));
  return parts;
}
function doSearch(q){
  const box=document.getElementById('sres');
  if(!q||q.trim().length<1){box.classList.remove('show');return;}
  q=q.trim();
  let hits=[];
  DAYS.forEach((day,di)=>{
    dayText(day).forEach(([where,txt])=>{
      const pos=txt.toLowerCase().indexOf(q.toLowerCase());
      if(pos>-1&&hits.length<30){
        const s=Math.max(0,pos-12),e=Math.min(txt.length,pos+q.length+26);
        const frag=(s>0?'…':'')+txt.slice(s,pos)+'<mark>'+txt.slice(pos,pos+q.length)+'</mark>'+txt.slice(pos+q.length,e)+(e<txt.length?'…':'');
        hits.push({di,d:day.d,where,frag});
      }
    });
  });
  box.innerHTML = hits.length
    ? hits.map(x=>`<div class="it" onclick="select('${x.di}');document.getElementById('sres').classList.remove('show');document.getElementById('q').value=''"><div class="dd">${x.d} · ${x.where}</div><div class="tx">${x.frag}</div></div>`).join('')
    : `<div class="none">没搜到「${escHtml(q)}」，换个词试试</div>`;
  box.classList.add('show');
}

/* ============ 路由与构建 ============ */
function jumpSec(id){
  const el=document.getElementById(id);if(!el)return;
  const top=document.querySelector('.top');
  const off=(top?top.offsetHeight:0)+10;   // 动态量 sticky 头部高度（移动端可折成200px+）
  window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-off,behavior:'smooth'});
}
function build(){
  const tl=document.getElementById('timeline');
  tl.innerHTML=DAYS.map((d,i)=>`<div class="tl" data-i="${i}"><div class="d">${d.d}<span class="wd">${d.wd}</span></div><div class="q">${d.q}</div></div>`).join('')
    +`<div class="tl flow" data-i="story"><div class="ic">📈</div><div class="lb">脉络/图表</div></div>`
    +`<div class="tl flow" data-i="rules"><div class="ic">📕</div><div class="lb">错题&铁律</div></div>`;
  tl.querySelectorAll('.tl').forEach(el=>el.addEventListener('click',()=>select(el.dataset.i)));
  select(hashToIndex(location.hash),true);
}
/* hash → 视图索引（build 初始化与 hashchange 共用） */
function hashToIndex(hash){
  const h=decodeURIComponent((hash||'').replace('#',''));
  if(h==='story'||h==='rules')return h;
  const di=DAYS.findIndex(d=>d.id===h||d.d===h);
  return di>-1?String(di):String(DAYS.length-1);
}
/* 浏览器后退/前进：hash 变了就同步视图 */
window.addEventListener('hashchange',()=>{
  const target=hashToIndex(location.hash);
  const act=document.querySelector('.tl.active');
  if(act&&act.dataset.i===target)return;   // 视图已一致（select 自己写 hash 触发的场景）
  select(target,true);
});
function select(i,noScroll){
  document.querySelectorAll('.tl').forEach(el=>el.classList.toggle('active',el.dataset.i===i));
  const view=document.getElementById('view');
  if(i==='story')view.innerHTML=renderStory();
  else if(i==='rules')view.innerHTML=renderRules();
  else view.innerHTML=renderDay(DAYS[+i]);
  location.hash=(i==='story'||i==='rules')?i:DAYS[+i].id;
  if(!noScroll)window.scrollTo({top:0,behavior:'smooth'});
}
/* 键盘左右切换 */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const act=document.querySelector('.tl.active');if(!act)return;
  const order=[...document.querySelectorAll('.tl')].map(el=>el.dataset.i);
  let idx=order.indexOf(act.dataset.i);
  if(e.key==='ArrowLeft'&&idx>0)select(order[idx-1]);
  if(e.key==='ArrowRight'&&idx<order.length-1)select(order[idx+1]);
});
/* 搜索绑定 */
const qEl=document.getElementById('q');
qEl.addEventListener('input',()=>doSearch(qEl.value));
document.addEventListener('click',e=>{if(!e.target.closest('.searchbox'))document.getElementById('sres').classList.remove('show');});
/* 回顶 */
const bt=document.getElementById('backtop');
window.addEventListener('scroll',()=>bt.classList.toggle('show',window.scrollY>500));
bt.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

/* ============ 实时大盘行情（腾讯接口·script注入绕过跨域） ============ */
const IDX_LIVE=[{code:'sh000001',nm:'上证'},{code:'sz399001',nm:'深成'},{code:'sz399006',nm:'创业板'},{code:'sh000688',nm:'科创50'}];
function liveTime(ds){if(!ds||ds.length<12)return'';return ds.slice(4,6)+'/'+ds.slice(6,8)+' '+ds.slice(8,10)+':'+ds.slice(10,12);}
function renderLive(){
  const box=document.getElementById('ticker');if(!box)return;
  let ok=false,cards='',ts='';
  IDX_LIVE.forEach(x=>{
    const raw=window['v_'+x.code];if(!raw)return;
    const a=raw.split('~');const px=parseFloat(a[3]),prev=parseFloat(a[4]);
    if(!px){return;}
    ok=true;   // 价格解析成功才算真取到（避免接口异常时渲染出空行情条）
    const pct=prev?(px-prev)/prev*100:0;const up=pct>=0,col=up?'#bf4a30':'#4f8456';
    if(!ts)ts=liveTime(a[30]);
    cards+=`<div class="lq"><span class="nm">${x.nm}</span><span class="px" style="color:${col}">${px.toFixed(2)}</span><span class="pc" style="color:${col}">${up?'+':''}${pct.toFixed(2)}%</span></div>`;
  });
  if(!ok){box.innerHTML='<span style="font-size:12px;color:var(--up)">⚠ 实时行情暂时取不到</span> <span class="rf" onclick="loadLive()">↻ 重试</span>';return;}
  box.innerHTML=cards+`<div class="meta"><span class="live">实时</span><span>${ts||'数据时间未知'}</span><span class="rf" onclick="loadLive()">↻ 刷新</span></div>`;
}
function loadLive(){
  const box=document.getElementById('ticker');if(!box)return;
  IDX_LIVE.forEach(x=>{try{delete window['v_'+x.code]}catch(e){}});   // 清掉旧数据，防止接口异常时拿陈旧价当"实时"
  const s=document.createElement('script');s.charset='gbk';
  s.src='https://qt.gtimg.cn/q='+IDX_LIVE.map(x=>x.code).join(',')+'&r='+Date.now();
  s.onload=()=>{renderLive();s.remove();};
  s.onerror=()=>{box.innerHTML='<span style="font-size:12px;color:var(--up)">⚠ 实时行情加载失败（可能网络限制）</span> <span class="rf" onclick="loadLive()">↻ 重试</span>';s.remove();};
  document.body.appendChild(s);
}
loadLive();
setInterval(()=>{if(!document.hidden)loadLive()},60000);   // 盘中每60秒刷新；后台标签页不白跑
document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadLive()});   // 切回来立刻补一次

build();
</script>
