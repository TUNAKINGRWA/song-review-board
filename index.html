<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松松复盘日记 · 归档看板</title>
<style>
  :root{
    --bg:#faf6ef; --bg2:#fffdf9; --card:#ffffff; --card2:#f5efe4;
    --line:#ece4d6; --line2:#ddd2bf;
    --orange:#e8631a; --orange-l:#f5862f; --gold:#caa24a; --cream:#7a5424;
    --up:#dc3a3a; --down:#159b57; --t1:#2c2620; --t2:#6f6354; --t3:#9f9482;
    --sh:0 2px 14px rgba(120,90,40,.07); --sh2:0 6px 22px rgba(120,90,40,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,sans-serif;
    background:radial-gradient(1100px 640px at 82% -8%,rgba(232,99,26,.10),transparent 60%),
               radial-gradient(820px 560px at -5% 102%,rgba(202,162,74,.12),transparent 55%),var(--bg);
    color:var(--t1);line-height:1.6;min-height:100vh;padding-bottom:60px}
  .wrap{max-width:1100px;margin:0 auto;padding:0 22px}
  .up{color:var(--up)}.down{color:var(--down)}.org{color:var(--orange)}
  .mono{font-variant-numeric:tabular-nums}

  /* 顶部 */
  .top{position:sticky;top:0;z-index:50;background:rgba(255,253,249,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .top .wrap{padding-top:14px;padding-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;margin-bottom:12px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--orange)}
  .brand .sub{font-size:12px;color:var(--t3);font-weight:500;margin-left:auto}
  /* 时间线 */
  .timeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
  .tl{flex:1;min-width:150px;text-align:left;background:var(--card);border:1px solid var(--line);
    border-radius:13px;padding:11px 14px;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
  .tl:hover{transform:translateY(-2px)}
  .tl.active{border-color:var(--orange);box-shadow:0 4px 16px rgba(232,99,26,.18)}
  .tl .d{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px}
  .tl .d .wd{font-size:11px;color:var(--t3);font-weight:500}
  .tl .q{font-size:11.5px;color:var(--t2);margin-top:4px;line-height:1.4}
  .tl.active .d{color:var(--orange)}
  .tl.flow{min-width:96px;flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
  .tl.flow .ic{font-size:18px}

  /* 视图 */
  #view{padding-top:26px}
  .hero{display:grid;grid-template-columns:1.6fr 1fr;gap:24px;align-items:center;margin-bottom:8px}
  .hero .eye{font-size:12px;letter-spacing:2px;color:var(--orange);font-weight:700}
  .hero h1{font-size:32px;font-weight:800;line-height:1.2;margin:8px 0 0}
  .hero .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .pill{font-size:12px;padding:4px 11px;border-radius:999px;border:1px solid var(--line2);background:var(--card);color:var(--t2);box-shadow:var(--sh)}
  .pill.warn{color:var(--up);border-color:rgba(220,58,58,.3);background:rgba(220,58,58,.06)}
  .gauge{position:relative;width:150px;height:150px;margin:0 auto}
  .gauge .lab{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .n{font-size:40px;font-weight:800;color:var(--orange);line-height:1}
  .gauge .c{font-size:11px;color:var(--t2);margin-top:4px}

  section{padding:22px 0;border-top:1px solid var(--line);margin-top:8px}
  .sh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .sh .bar{width:5px;height:20px;border-radius:3px;background:var(--orange)}
  .sh h2{font-size:18px;font-weight:800}
  .grid{display:grid;gap:14px}
  .c3{grid-template-columns:repeat(3,1fr)}
  .c2{grid-template-columns:1fr 1fr}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--sh)}
  .idx .nm{font-size:13px;color:var(--t2)}
  .idx .cl{font-size:26px;font-weight:800;margin:4px 0 2px}
  .idx .cg{font-size:14px;font-weight:700}
  .idx .ex{font-size:11.5px;color:var(--t3);margin-top:6px}
  .vs{display:flex;height:36px;border-radius:9px;overflow:hidden;margin-top:6px}
  .vs .l{background:var(--up);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .vs .r{background:var(--down);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .fl{display:grid;gap:8px}
  .fl .r{display:grid;grid-template-columns:96px 1fr 58px;align-items:center;gap:9px;font-size:12.5px}
  .fl .nm{color:var(--t2);text-align:right}
  .fl .tk{height:20px;background:var(--card2);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .fl .f{height:100%;border-radius:5px}
  .fl .v{font-weight:700;font-size:12px}
  .stk{display:grid;grid-template-columns:74px 1fr 46px;align-items:center;gap:8px;margin-bottom:6px;font-size:12.5px}
  .stk .tk{height:15px;background:var(--card2);border-radius:4px;overflow:hidden}
  .stk .f{height:100%}
  .stk .pt{text-align:right;font-weight:700;font-size:11.5px}
  .plan{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .pk{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;box-shadow:var(--sh);position:relative;overflow:hidden}
  .pk::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange)}
  .pk .nm{font-size:15px;font-weight:800}
  .pk .ps{font-size:20px;font-weight:800;color:var(--orange);margin:6px 0 2px}
  .pk .nt{font-size:11.5px;color:var(--t2)}
  .read{display:grid;gap:9px}
  .read .i{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:13px;color:var(--t2);box-shadow:var(--sh)}
  .read .i b{color:var(--cream)}
  .chip{display:inline-block;font-size:11.5px;padding:4px 10px;border-radius:7px;background:var(--card2);border:1px solid var(--line);color:var(--t2);margin:3px 4px 0 0}
  .chip.hot{color:var(--orange);border-color:rgba(232,99,26,.3)}
  .err{background:rgba(220,58,58,.05);border:1px solid rgba(220,58,58,.25)}
  .err h2{color:var(--up)}
  .err .res{font-size:14px;font-weight:700;color:var(--up);margin:8px 0}
  .tradetab{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
  .tradetab th,.tradetab td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)}
  .tradetab th{color:var(--t3);font-weight:600}
  .assets{font-size:13px;color:var(--t2)}.assets b{font-size:22px;color:var(--t1)}

  /* 脉络视图 */
  .story{display:grid;gap:14px}
  .snode{display:grid;grid-template-columns:60px 1fr;gap:14px;align-items:start}
  .snode .dd{font-size:16px;font-weight:800;color:var(--orange);text-align:center;padding-top:14px;position:relative}
  .snode .dd::after{content:"";position:absolute;left:50%;top:42px;bottom:-14px;width:2px;background:var(--line2);transform:translateX(-50%)}
  .snode:last-child .dd::after{display:none}
  .snode .card{flex:1}
  .snode .tt{font-size:15px;font-weight:800;margin-bottom:6px}
  .snode .tx{font-size:13px;color:var(--t2)}
  .navib{font-size:11px;color:var(--t3);margin-top:14px;text-align:center}

  @media(max-width:820px){.hero{grid-template-columns:1fr}.c3,.c2,.plan{grid-template-columns:1fr}.hero h1{font-size:26px}}
</style>
</head>

function maxAbs(arr){return Math.max.apply(null,arr.map(x=>Math.abs(x.v)))||1}
function flowRows(items,color){
  const m=maxAbs(items);
  return items.map(x=>`<div class="r"><span class="nm">${x.nm}</span><div class="tk"><div class="f" style="width:${Math.abs(x.v)/m*100}%;background:${color}"></div></div><span class="v" style="color:${color}">${x.v>0?'+':'−'}${Math.abs(x.v)}</span></div>`).join('');
}
function stkRows(items,color,sign){
  const m=maxAbs(items);
  return items.map(x=>`<div class="stk"><span>${x.nm}</span><div class="tk"><div class="f" style="width:${Math.abs(x.v)/m*100}%;background:${color}"></div></div><span class="pt" style="color:${color}">${sign}${x.v}</span></div>`).join('');
}

  <section><div class="sh"><span class="bar"></span><h2>指数贡献拆解</h2></div>
    <div class="grid c2">
      <div class="card"><div style="font-size:13px;color:var(--t1);margin-bottom:10px"><span class="up">▲</span> ${cUpLabel}</div>${stkRows(day.cUp,'#dc3a3a','+')}</div>
      <div class="card"><div style="font-size:13px;color:var(--t1);margin-bottom:10px"><span class="down">▼</span> ${cDownLabel}</div>${stkRows(day.cDown,'#159b57','−')}</div>
    </div>
  </section>`;

  // 实盘 + 错题（仅6.3）
  if(day.trades){
    html += `
    <section><div class="sh"><span class="bar"></span><h2>⭐ 实盘记录</h2></div>
      <div class="grid c2">
        <div class="card">
          <table class="tradetab"><tr><th>持仓</th><th>价格</th><th>数量</th></tr>
          ${day.trades.hold.map(h=>`<tr><td>${h.nm}</td><td class="mono">${h.px}</td><td class="mono">${h.qty}</td></tr>`).join('')}</table>
          <div class="assets" style="margin-top:12px">收盘总资产 <b class="mono">${day.trades.assets}</b> 元</div>
        </div>
        <div class="card err">
          <div style="font-size:13px;color:var(--up);font-weight:700;margin-bottom:4px">错题 · 自我复盘</div>
          <div class="res">${day.mistake.res}</div>
          <div style="font-size:12.5px;color:var(--t2)">${day.mistake.txt}</div>
        </div>
      </div>
    </section>`;
  }

  html += `
  <section><div class="sh"><span class="bar"></span><h2>操盘计划 · 推荐票</h2></div>
    <div class="plan">${day.plan.map(p=>`<div class="pk"><div class="nm">${p.nm}</div><div class="ps">${p.ps}</div><div class="nt">${p.nt}</div></div>`).join('')}</div>
  </section>

  <section><div class="sh"><span class="bar"></span><h2>我的解读</h2></div>
    <div class="read">${day.read.map(r=>`<div class="i">${r}</div>`).join('')}</div>
  </section>`;

  return html;
}

function renderStory(){
  const nodes = DAYS.map(d=>`
    <div class="snode"><div class="dd">${d.d}</div>
      <div class="card"><div class="tt">${d.q}</div><div class="tx"><b>主线：</b>${d.main}</div></div></div>`).join('');
  const navrows = NAV.map(n=>`<tr><td>${n.d}</td><td class="mono">${n.a}</td><td>${n.chg}</td></tr>`).join('');
  return `
  <div class="hero"><div><div class="eye">三天脉络</div><h1>高切低 → 一日反转 → 认错切回</h1>
    <div class="meta"><span class="pill">资金一天反转762亿</span><span class="pill">焦煤切换被打脸</span><span class="pill warn">⚠ 单日资金不外推</span></div></div></div>
  <section><div class="sh"><span class="bar"></span><h2>主线演进</h2></div><div class="story">${nodes}</div>
    <div class="navib">每天的资金主线在变，方向反复——这就是为什么「单日不外推、当日认错」是铁律。</div>
  </section>
  <section><div class="sh"><span class="bar"></span><h2>实盘净值</h2></div>
    <div class="card"><table class="tradetab"><tr><th>日期</th><th>收盘总资产</th><th>变动</th></tr>${navrows}</table>
    <div style="font-size:12px;color:var(--t3);margin-top:10px">每天补一行收盘总资产，就能画真实净值曲线、算每笔胜率。</div></div>
  </section>`;
}

function build(){
  const tl = document.getElementById('timeline');
  tl.innerHTML = DAYS.map((d,i)=>`<div class="tl" data-i="${i}"><div class="d">${d.d}<span class="wd">${d.wd.split('·')[0]}</span></div><div class="q">${d.q}</div></div>`).join('')
    + `<div class="tl flow" data-i="story"><div class="ic">📈</div><div style="font-size:12px;font-weight:700;margin-top:3px">脉络/净值</div></div>`;
  tl.querySelectorAll('.tl').forEach(el=>el.addEventListener('click',()=>select(el.dataset.i)));
  select(String(DAYS.length-1)); // 默认打开最新一天
}
function select(i){
  document.querySelectorAll('.tl').forEach(el=>el.classList.toggle('active',el.dataset.i===i));
  const view = document.getElementById('view');
  view.innerHTML = (i==='story') ? renderStory() : renderDay(DAYS[+i]);
  window.scrollTo({top:0,behavior:'smooth'});
}
build();
</script>
</body>
</html>
